service:
  name: pip-test-service
  version: 1.0.0
  repository: patchg/pip-test-service

runtime:
  internal:
    - name: auth-service
      type: http
      endpoint: https://auth.internal/api/v1
      criticality: high
      fallback: none
  databases:
    - name: primary-postgres
      type: postgresql
      version: "15.x"
      criticality: high

build:
  runtime: node
  version: "20.x"

infrastructure:
  platform: aws
  services:
    - name: lambda
      purpose: compute
    - name: s3
      purpose: storage
